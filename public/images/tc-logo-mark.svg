    <ellipse cx="32" cy="32" rx="27" ry="10.5" stroke="url(#tcOrbA)" transform="rotate(32 32 32)" />
    <ellipse cx="32" cy="32" rx="27" ry="10.5" stroke="url(#tcOrbB)" transform="rotate(-32 32 32)" opacity="0.92" />
  </g>

  <!-- connected chain nodes on the orbits -->
  <g filter="url(#tcGlow)">
    <circle cx="8.7" cy="17.4" r="3.1" fill="#5FE3EF" />
    <circle cx="55.3" cy="46.6" r="3.1" fill="#5B8BFF" />
    <circle cx="8.7" cy="46.6" r="3.1" fill="#7C5CFF" />
    <circle cx="55.3" cy="17.4" r="3.1" fill="#3FD0E6" />
  </g>

