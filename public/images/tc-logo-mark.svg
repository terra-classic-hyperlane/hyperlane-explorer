<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="Terra Classic">
  <defs>
    <linearGradient id="tcOrbA" x1="4" y1="8" x2="60" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5FE3EF" />
      <stop offset="1" stop-color="#5B8BFF" />
    </linearGradient>
    <linearGradient id="tcOrbB" x1="60" y1="8" x2="4" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C5CFF" />
      <stop offset="1" stop-color="#3FD0E6" />
    </linearGradient>
    <filter id="tcGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Terra Classic brand mark gradients (from app-logo.svg) -->
    <linearGradient id="tcBrandA" x1="35.55" y1="48.97" x2="35.55" y2="24.51" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#4366c2"/><stop offset="0.15" stop-color="#3458b8"/><stop offset="0.4" stop-color="#2348ac"/><stop offset="0.67" stop-color="#193fa5"/><stop offset="1" stop-color="#163ca3"/></linearGradient>
    <linearGradient id="tcBrandB" x1="28.73" y1="22.86" x2="28.73" y2="0" xlink:href="#tcBrandA"/>
    <linearGradient id="tcBrandC" x1="2.68" y1="8.02" x2="19.28" y2="8.02" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#58c66b"/><stop offset="1" stop-color="#5491f6"/></linearGradient>
    <linearGradient id="tcBrandD" x1="0" y1="32.68" x2="16.02" y2="32.68" xlink:href="#tcBrandC"/>
    <linearGradient id="tcBrandE" x1="14.03" y1="20.12" x2="52" y2="20.12" xlink:href="#tcBrandC"/>
    <linearGradient id="tcBrandF" x1="33.83" y1="43.42" x2="48.69" y2="43.42" xlink:href="#tcBrandC"/>
  </defs>

  <!-- interchain orbits (bridge) -->
